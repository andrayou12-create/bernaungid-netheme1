<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Link Undangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: sans-serif; background: #fdfaf6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #5A0000; }
        h2 { font-family: 'Playball', cursive; color: #5A0000; font-size: 30px; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; outline-color: #5A0000; }
        
        .btn-wa { background: #25D366; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        
        /* Tombol Khusus Instagram */
        .btn-ig { background: #E1306C; color: white; border: none; padding: 15px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        
        .btn-wa:hover, .btn-ig:hover { transform: translateY(-2px); opacity: 0.9; }
        .footer-text { margin-top: 20px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Kirim Undangan</h2>
    <p>Ketik nama tamu & pilih media kirim:</p>
    
    <input type="text" id="namaTamu" placeholder="Contoh: Nama Tamu">
    
    <button class="btn-wa" onclick="kirimWA()">
        <i class="fab fa-whatsapp"></i> Kirim via WhatsApp
    </button>

    <button class="btn-ig" onclick="kirimIG()">
        <i class="fab fa-instagram"></i> Salin Link & Buka IG
    </button>

    <div class="footer-text">Bernaung Invitation</div>
</div>

<script>
    function kirimWA() {
        const nama = document.getElementById('namaTamu').value;
        if (nama === "") {
            alert("Silakan masukkan nama tamu terlebih dahulu!");
            return;
        }

        const currentUrl = window.location.origin + window.location.pathname;
        const linkFix = currentUrl.replace('tamu.html', 'index.html') + "?to=" + encodeURIComponent(nama);

        // TEXT PESAN LENGKAP
        const pesanMentah = 
            "Kepada Yth.\n" +
            "Bapak/Ibu/Saudara/i\n" +
            "*" + nama + "*\n" + 
            "_______\n\n" +
            "Assalamualaikum Warahmatullahi Wabarakatuh\n\n" +
            "Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami.\n\n" +
            "Berikut detail acara kami lampirkan dalam link undangan berikut :\n" +
            linkFix + "\n\n" +
            "NB: Hasil maksimal buka lewat browser chrome/safari\n\n" +
            "Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.\n\n" +
            "Wassalamualaikum Warahmatullahi Wabarakatuh\n\n" +
            "Terima Kasih\n\n" +
            "Hormat kami,\n" +
            "Rofif & Aniq\n" + 
            "________\n\n" +
            "Mohon maaf jika ada kesalahan penulisan nama atau gelar";

        const pesanFull = encodeURIComponent(pesanMentah);
        window.open("https://api.whatsapp.com/send?text=" + pesanFull, '_blank');
    }

    function kirimIG() {
        const nama = document.getElementById('namaTamu').value;
        if (nama === "") {
            alert("Silakan masukkan nama tamu terlebih dahulu!");
            return;
        }

        const currentUrl = window.location.origin + window.location.pathname;
        const linkFix = currentUrl.replace('tamu.html', 'index.html') + "?to=" + encodeURIComponent(nama);

        // TEXT PESAN LENGKAP UNTUK IG (SAMA DENGAN WA)
        const pesanIG = 
               "Kepada Yth.\n" +
            "Bapak/Ibu/Saudara/i\n" +
            "nama\n" + 
            "_______\n\n" +
            "Assalamualaikum Warahmatullahi Wabarakatuh\n\n" +
            "Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami.\n\n" +
            "Berikut detail acara kami lampirkan dalam link undangan berikut :\n" +
            linkFix + "\n\n" +
            "NB: Hasil maksimal buka lewat browser chrome/safari\n\n" +
            "Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.\n\n" +
            "Wassalamualaikum Warahmatullahi Wabarakatuh\n\n" +
            "Terima Kasih\n\n" +
            "Hormat kami,\n" +
            "Rofif & Aniq\n" + 
            "________\n\n" +
            "Mohon maaf jika ada kesalahan penulisan nama atau gelar";
        // PROSES SALIN TEKS KE CLIPBOARD
        navigator.clipboard.writeText(pesanIG).then(() => {
            alert("Teks Undangan Rofif & Aniq Berhasil Disalin! Sekarang silakan Paste (Tempel) di DM Instagram.");
            
            // Buka Instagram
            window.location.href = "instagram://library?AssetPath=dm"; 
            setTimeout(() => {
                window.open("https://www.instagram.com/direct/inbox/", "_blank");
            }, 500);
        });
    }
</script>
